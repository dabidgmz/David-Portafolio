<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#1c1c1e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="55%">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="55%">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Status pill -->
  <g transform="translate(72, 80)">
    <rect width="220" height="38" rx="19" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <circle cx="22" cy="19" r="5" fill="#34c759"/>
    <text x="38" y="25" font-family="-apple-system, Inter, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)" letter-spacing="0.5">
      AVAILABLE FOR PROJECTS
    </text>
  </g>

  <!-- Avatar ring -->
  <g transform="translate(960, 220)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="100" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <text x="0" y="14" font-family="-apple-system, Inter, sans-serif" font-size="74" font-weight="700" fill="#f5f5f7" text-anchor="middle" letter-spacing="-2">
      D
    </text>
  </g>

  <!-- Hero title -->
  <g transform="translate(72, 220)">
    <text font-family="-apple-system, 'SF Pro Display', Inter, sans-serif" font-size="80" font-weight="700" fill="#f5f5f7" letter-spacing="-3.5">
      <tspan x="0" y="0">David Herrera</tspan>
    </text>
    <text font-family="-apple-system, 'SF Pro Display', Inter, sans-serif" font-size="80" font-weight="700" letter-spacing="-3.5">
      <tspan x="0" y="86" fill="url(#ring)">Full-Stack Developer</tspan>
    </text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(72, 410)">
    <text font-family="-apple-system, Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(245,245,247,0.72)" letter-spacing="-0.4">
      <tspan x="0" y="0">Enterprise ERP · AI Integrations · SAT/CFDI 4.0</tspan>
    </text>
  </g>

  <!-- Tech chips -->
  <g transform="translate(72, 478)" font-family="-apple-system, Inter, sans-serif" font-size="14" font-weight="600" fill="rgba(245,245,247,0.85)" letter-spacing="-0.1">
    <g transform="translate(0,0)">
      <rect width="98" height="36" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <text x="49" y="23" text-anchor="middle">React</text>
    </g>
    <g transform="translate(110,0)">
      <rect width="118" height="36" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <text x="59" y="23" text-anchor="middle">Astro</text>
    </g>
    <g transform="translate(238,0)">
      <rect width="128" height="36" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <text x="64" y="23" text-anchor="middle">Laravel</text>
    </g>
    <g transform="translate(376,0)">
      <rect width="138" height="36" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <text x="69" y="23" text-anchor="middle">Claude AI</text>
    </g>
    <g transform="translate(524,0)">
      <rect width="118" height="36" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <text x="59" y="23" text-anchor="middle">Python</text>
    </g>
    <g transform="translate(652,0)">
      <rect width="118" height="36" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <text x="59" y="23" text-anchor="middle">Docker</text>
    </g>
  </g>

  <!-- Footer URL -->
  <g transform="translate(72, 558)">
    <text font-family="-apple-system, Inter, sans-serif" font-size="14" font-weight="600" fill="rgba(245,245,247,0.5)" letter-spacing="0.4">
      DAVIDGOMEZ.DEV
    </text>
  </g>
</svg>
