# Configuración de Nginx para el Portafolio
# Copiar a: /etc/nginx/sites-available/portafolio

server {
    listen 80;
    listen [::]:80;
    
    # Reemplazar con tu dominio o IP
    server_name tu-dominio.com www.tu-dominio.com;
    
    # Directorio donde están los archivos del build
    root /var/www/portafolio;
    index index.html;
    
    # Logs
    access_log /var/log/nginx/portafolio-access.log;
    error_log /var/log/nginx/portafolio-error.log;
    
    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json image/svg+xml;
    
    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Manejo de archivos estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # React Router - todas las rutas van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Error pages
    error_page 404 /index.html;
}

